[tool.black]
line-length = 100
target-version = ['py39']
skip-string-normalization = true

[tool.flake8]
max-line-length = 100
ignore = [
    "E203",  # whitespace before ':'
    "E501",  # line too long
    "W503",  # line break before binary operator
]
exclude = ["venv", "__pycache__"]

[tool.isort]
profile = "black"
line_length = 100
skip = ["venv", "__pycache__"]